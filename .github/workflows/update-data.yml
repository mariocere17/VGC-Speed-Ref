name: Update Speed Data

on:
  schedule:
    - cron: '0 2 * * *'   # 2am UTC every day
  workflow_dispatch:        # allow manual run from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scraper/package-lock.json

      - name: Install dependencies
        run: cd scraper && npm install

      - name: Run scraper
        run: node scraper/scrape.js

      - name: Commit and push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet && echo "No changes" || (
            git commit -m "chore: update speed data $(date -u '+%Y-%m-%d')" &&
            git push
          )
