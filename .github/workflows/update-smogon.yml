name: Update Smogon SP Spreads

on:
  schedule:
    - cron: '0 4 2 * *'   # 4am UTC on the 2nd of every month
  workflow_dispatch:        # allow manual run from GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Scrape Smogon SP spreads
        run: node generator/scrape-smogon.js

      - name: Commit and push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add smogon.json
          git diff --staged --quiet && echo "No changes" || (
            git commit -m "chore: update smogon SP spreads $(date -u '+%Y-%m')" &&
            git push
          )
